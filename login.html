<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family: Inter, system-ui;
  background:#0f1b2d;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  color:#fff;
}

/* CARD */
.login-box{
  background:#1e2a47;
  padding:35px;
  border-radius:12px;
  width:360px;
  box-shadow:0 20px 50px rgba(0,0,0,0.6);
  text-align:center;
}

/* LOGO */
.logo{
  margin-bottom:20px;
}

.logo img{
  width:80px;
}

/* TITLE */
h2{
  margin-bottom:10px;
  font-size:22px;
}

.subtitle{
  font-size:13px;
  color:#94a3b8;
  margin-bottom:25px;
}

/* LABEL */
label{
  display:block;
  text-align:left;
  font-size:13px;
  margin-bottom:5px;
  margin-top:15px;
}

/* INPUT */
.input{
  width:100%;
  height:42px;
  border-radius:8px;
  border:1px solid rgba(255,255,255,0.1);
  background:#0f1b2d;
  color:#fff;
  padding:0 12px;
  outline:none;
}

/* INPUT FOCUS */
.input:focus{
  border:1px solid #84cc16;
  box-shadow:0 0 0 1px #84cc16;
}

/* PASSWORD ICON */
.password-box{
  position:relative;
}

.eye{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  opacity:0.7;
}

/* BUTTON */
.btn{
  margin-top:20px;
  width:100%;
  height:45px;
  background:#84cc16;
  border:none;
  border-radius:8px;
  color:#0f172a;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}

.btn:hover{
  background:#65a30d;
}
</style>
</head>

<body>

<div class="login-box">

  <!-- LOGO -->
  <div class="logo">
    <img src="https://res.cloudinary.com/dsreg6hmo/image/upload/v1764787274/BetBoard/Photos/edintuhnzhaggj2uhnig.jpg">
  </div>

  <h2>Login</h2>
  <p class="subtitle">Entre com suas credenciais para acessar o sistema</p>

  <!-- EMAIL -->
  <label>Email</label>
  <input id="user" class="input" placeholder="seu@email.com">

  <!-- SENHA -->
  <label>Senha</label>
  <div class="password-box">
    <input id="pass" type="password" class="input" placeholder="Digite sua senha">
    <span class="eye" onclick="togglePass()">👁</span>
  </div>

  <!-- BOTÃO -->
  <button class="btn" onclick="login()">Entrar</button>

</div>

<script>
function togglePass(){
  const input = document.getElementById("pass");
  input.type = input.type === "password" ? "text" : "password";
}

function login(){
  fetch("http://localhost:3001/login", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      user: document.getElementById("user").value,
      pass: document.getElementById("pass").value
    })
  })
  .then(res=>res.json())
  .then(data=>{
    if(data.success){
      localStorage.setItem("logado","true");
      window.location.href = "site.html";
    } else {
      alert("Login inválido");
    }
  });
}
</script>

</body>
</html>
